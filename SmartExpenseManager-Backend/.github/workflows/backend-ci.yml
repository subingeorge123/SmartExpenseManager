name: Flask CI/CD with SonarQube

on:
  push:
    branches: [ "main"]

env:
  AWS_REGION: us-east-1
  EB_APP_NAME: expense-manager-api
  EB_ENV_NAME: expense-manager-api-env
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sonar_scan:
    name: SonarQube Code Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest --cov=app --cov-report=xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.projectKey=subingeorge-123_smart-expense-manager
            -Dsonar.organization=subingeorge-123
            -Dsonar.branch.name=${{ github.ref_name }}
            -Dsonar.exclusions=**/coverage.xml,**/tests/**,**/venv/**
            -Dsonar.python.version=3.11
            -Dsonar.sourceEncoding=UTF-8

  build_and_deploy:
    name: Build and Deploy to Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: sonar_scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Package Flask App
        run: zip -r deploy.zip *

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY }}
          aws_secret_key: ${{ secrets.AWS_SECRET_KEY }}
          application_name: ${{ env.EB_APP_NAME }}
          environment_name: ${{ env.EB_ENV_NAME }}
          region: ${{ env.AWS_REGION }}
          version_label: ${{ github.sha }}
          deployment_package: deploy.zip

      - name: Deployment Status
        run: echo "Deployment job completed."